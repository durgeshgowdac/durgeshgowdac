name: Generate Snake

on:
  workflow_dispatch: # for manual workflow trigger
  schedule:
    - cron: '0 13 * * *' # runs at every 1PM UTC

jobs:
  build:
    name: Jobs to update snake grid
    runs-on: ubuntu-latest
    steps:
      - uses: Platane/snk/svg-only@v3
        with:
          # github user name to read the contribution graph from (**required**)
          # using action context var `github.repository_owner` or specified user
          github_user_name: ${{ github.repository_owner }}

          # list of files to generate.
          # one file per line. Each output can be customized with options as query string.
          #
          #  supported options:
          #  - palette:     A preset of color, one of [github, github-dark, github-light]
          #  - color_snake: Color of the snake
          #  - color_dots:  Coma separated list of dots color.
          #                 The first one is 0 contribution, then it goes from the low contribution to the highest.
          #                 Exactly 5 colors are expected.
          outputs: |
            outputs: |
              dist/github-snake.svg?color_snake=#FF6B9D&color_dots=#2d0a17,#7a1a3a,#c23060,#f05a8e,#FF6B9D
              dist/ocean.svg?color_snake=#A855F7&color_dots=#0d0a1a,#2d1060,#6020b0,#8f38e0,#A855F7
        env:
          # a github token is required to fetch the contribution calendar from github API
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - uses: crazy-max/ghaction-github-pages@v5.0.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
